name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project lil-agents.xcodeproj -scheme LilAgents
      - name: Build
        run: |
          xcodebuild build -project lil-agents.xcodeproj -scheme LilAgents \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO
      - name: Package app
        run: |
          APP_PATH=$(find build -name "lil agents.app" -type d | head -1)
          ditto "$APP_PATH" "lil-agents.app"
          ditto -c -k --sequesterRsrc "lil-agents.app" lil-agents.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lil-agents-app
          path: lil-agents.zip
